name: Build Demo Assets

'on':
  push:
    branches: [main, develop, master]
    tags:
      - "v*"
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'README_en.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-pages.yml'
  pull_request:
    branches: [main, develop, master]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'README_en.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:
    inputs:
      package_version:
        description: Optional package version used in demo asset filenames
        required: false
        default: ""
  workflow_call:
    inputs:
      package_version:
        description: Optional package version used in demo asset filenames
        required: false
        type: string

env:
  DEMO_PACKAGE_VERSION: ${{ inputs.package_version || github.ref_name || 'dev' }}

jobs:
  build-linux-demos:
    name: Build demo asset (linux-x64)
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Build and publish Linux demos
        run: bash ./build-linux-demos.sh --clean --rid linux-x64

      - name: Archive Linux demos
        shell: bash
        run: |
          mkdir -p release_assets
          tar -C dist -czf "release_assets/LVGLSharp-demos-linux-x64-${{ env.DEMO_PACKAGE_VERSION }}.tar.gz" linux-x64
          ls -lh release_assets

      - name: Upload Linux demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-release-linux-x64
          path: release_assets/LVGLSharp-demos-linux-x64-${{ env.DEMO_PACKAGE_VERSION }}.tar.gz
          if-no-files-found: error

  build-windows-demos:
    name: Build demo asset (win-x64)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build and publish Windows demos
        shell: pwsh
        run: ./build-windows-demos.ps1 -Clean -Rid win-x64

      - name: Archive Windows demos
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_assets -Force | Out-Null
          $archivePath = Join-Path $PWD "release_assets/LVGLSharp-demos-win-x64-${{ env.DEMO_PACKAGE_VERSION }}.zip"
          if (Test-Path $archivePath) {
            Remove-Item -Force $archivePath
          }

          Compress-Archive -Path "dist/win-x64" -DestinationPath $archivePath -CompressionLevel Optimal
          Get-ChildItem release_assets | Format-Table Name, Length -AutoSize

      - name: Upload Windows demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-release-win-x64
          path: release_assets/LVGLSharp-demos-win-x64-${{ env.DEMO_PACKAGE_VERSION }}.zip
          if-no-files-found: error

  build-macos-demo-skeleton:
    name: Build macOS AOT demo (osx-arm64)
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install macOS build dependencies
        run: brew install cmake ninja

      - name: Build native LVGL library for osx-arm64
        shell: bash
        run: |
          cp libs/lv_conf.h libs/lvgl/lv_conf.h
          cmake -S libs/lvgl -B libs/lvgl/build_demo_macos \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCONFIG_LV_BUILD_EXAMPLES=OFF \
            -DCONFIG_LV_BUILD_DEMOS=OFF \
            -DCONFIG_LV_USE_THORVG_INTERNAL=OFF \
            -DBUILD_SHARED_LIBS=ON \
            -DCONFIG_LV_USE_PRIVATE_API=ON
          cmake --build libs/lvgl/build_demo_macos
          mkdir -p src/LVGLSharp.Native/runtimes/osx-arm64/native
          cp "$(find libs/lvgl/build_demo_macos -name liblvgl.dylib | head -1)" src/LVGLSharp.Native/runtimes/osx-arm64/native/liblvgl.dylib
          ls -la src/LVGLSharp.Native/runtimes/osx-arm64/native

      - name: Publish macOS AOT demo
        shell: bash
        run: |
          dotnet publish ./src/Demos/MacOsAotDemo/MacOsAotDemo.csproj \
            -c Release \
            -r osx-arm64 \
            -o dist/osx-arm64/MacOsAotDemo

      - name: Archive macOS demo
        shell: bash
        run: |
          mkdir -p release_assets
          tar -C dist/osx-arm64 -czf "release_assets/LVGLSharp-demos-osx-arm64-${{ env.DEMO_PACKAGE_VERSION }}.tar.gz" MacOsAotDemo
          ls -lh release_assets

      - name: Upload macOS demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-release-osx-arm64
          path: release_assets/LVGLSharp-demos-osx-arm64-${{ env.DEMO_PACKAGE_VERSION }}.tar.gz
          if-no-files-found: error
