name: Headless Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  headless-tests:
    name: Headless Release tests
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Headless test project
        shell: pwsh
        run: |
          dotnet build tests\LVGLSharp.Headless.Tests\LVGLSharp.Headless.Tests.csproj `
            -c Release `
            --nologo `
            -p:ContinuousIntegrationBuild=true `
            /m:1

      - name: Inspect Headless native assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $testOutput = Join-Path $PWD 'tests\LVGLSharp.Headless.Tests\bin\Release\net10.0'
          $nativeRoot = Join-Path $testOutput 'runtimes'

          $architecture = [System.Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture.ToString()
          $rid = switch ($architecture) {
            'X86' { 'win-x86'; break }
            'Arm64' { 'win-arm64'; break }
            default { 'win-x64'; break }
          }

          $expectedNative = Join-Path $nativeRoot (Join-Path $rid 'native\lvgl.dll')

          Write-Host "Headless test output: $testOutput"
          Write-Host "Runner architecture: $architecture"
          Write-Host "Expected native RID: $rid"
          Write-Host "Expected native asset: $expectedNative"

          if (Test-Path -LiteralPath $nativeRoot) {
            Get-ChildItem -LiteralPath $nativeRoot -Recurse -File |
              Sort-Object FullName |
              ForEach-Object {
                Write-Host ("Native asset: {0} ({1} bytes)" -f $_.FullName, $_.Length)
              }
          }
          else {
            Write-Host "Native root missing: $nativeRoot"
          }

          if (-not (Test-Path -LiteralPath $expectedNative -PathType Leaf)) {
            throw "Headless native asset missing from test output: $expectedNative"
          }

      - name: Run Headless Release tests
        shell: pwsh
        run: |
          dotnet test tests\LVGLSharp.Headless.Tests\LVGLSharp.Headless.Tests.csproj `
            -c Release `
            --no-build `
            --nologo `
            --logger "trx;LogFileName=headless-release.trx" `
            --results-directory artifacts\test-results\headless-release

      - name: Upload Headless test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: headless-test-results
          path: artifacts/test-results/headless-release/
          if-no-files-found: ignore
