name: Coordinate Packaging And Release

'on':
  push:
    tags:
      - "v*"
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'README_en.md'
      - 'ROADMAP.md'
      - 'CHANGELOG.md'
      - '.github/workflows/docs-pages.yml'
  workflow_dispatch:
    inputs:
      version:
        description: Package version, for example 9.5.0.5 or v9.5.0.5
        required: true
        default: "9.5.0.5"
      publish_nuget:
        description: Whether to publish to NuGet.org
        type: boolean
        default: true
      publish_github:
        description: Whether to publish to GitHub Packages
        type: boolean
        default: true

jobs:
  prepare:
    name: Prepare release metadata
    uses: ./.github/workflows/prepare-release.yml
    with:
      package_version: ${{ github.event.inputs.version || github.ref_name }}
    permissions:
      contents: read

  build-native:
    name: Build native assets
    needs: prepare
    uses: ./.github/workflows/build-native.yml
    permissions:
      contents: read

  pack:
    name: Pack NuGet packages
    needs: [prepare, build-native]
    uses: ./.github/workflows/pack-nuget.yml
    with:
      package_version: ${{ needs.prepare.outputs.package_version }}
    permissions:
      contents: read

  build-demos:
    name: Build demo assets
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: prepare
    uses: ./.github/workflows/build-demos.yml
    with:
      package_version: ${{ needs.prepare.outputs.package_version }}
    permissions:
      contents: read

  publish:
    name: Publish artifacts
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      (
        github.event_name == 'workflow_dispatch' &&
        (
          github.event.inputs.publish_nuget == 'true' ||
          github.event.inputs.publish_github == 'true'
        )
      )
    needs: [prepare, pack, build-demos]
    uses: ./.github/workflows/publish-release.yml
    with:
      release_tag: ${{ needs.prepare.outputs.release_tag }}
      publish_nuget: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_nuget == 'true' }}
      publish_github: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_github == 'true' }}
    secrets: inherit
    permissions:
      contents: write
      packages: write
