name: Prepare Release Metadata

'on':
  workflow_call:
    inputs:
      package_version:
        description: Optional package version, for example 9.5.0.5 or v9.5.0.5
        required: false
        type: string
    outputs:
      package_version:
        value: ${{ jobs.prepare.outputs.package_version }}
      release_tag:
        value: ${{ jobs.prepare.outputs.release_tag }}

jobs:
  prepare:
    name: Normalize package version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Validate and normalize version
        id: version
        shell: bash
        run: |
          raw_version="${{ inputs.package_version }}"

          if [ -z "$raw_version" ]; then
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              raw_version="$GITHUB_REF_NAME"
            else
              raw_version="0.0.0.${GITHUB_RUN_NUMBER}"
            fi
          elif [[ "$GITHUB_REF" != refs/tags/* && "$raw_version" == "$GITHUB_REF_NAME" ]]; then
            raw_version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi

          version="${raw_version#v}"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){3}$ ]]; then
            echo "Error: version '$raw_version' must use a four-part numeric format like 9.5.0.5 or v9.5.0.5."
            exit 1
          fi

          if [[ "$raw_version" == v* ]]; then
            tag="$raw_version"
          else
            tag="v$version"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using package version: $version"
          echo "Using release tag: $tag"
