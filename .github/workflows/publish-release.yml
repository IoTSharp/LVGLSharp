name: Publish NuGet Packages And Release Assets

'on':
  workflow_call:
    inputs:
      release_tag:
        description: Release tag, usually in the form v9.5.0.5
        required: true
        type: string
      publish_nuget:
        description: Whether to publish to NuGet.org
        required: true
        type: boolean
      publish_github:
        description: Whether to publish to GitHub Packages
        required: true
        type: boolean

jobs:
  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs

      - name: Download demo assets
        uses: actions/download-artifact@v4
        with:
          pattern: demo-release-*
          path: demo_assets
          merge-multiple: true

      - name: Gather release assets
        shell: bash
        run: |
          mkdir -p release_assets
          cp nupkgs/*.nupkg release_assets/
          if [ -d demo_assets ]; then
            find demo_assets -maxdepth 1 -type f -exec cp {} release_assets/ \;
          fi
          ls -lh release_assets

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}"
          http_status=$(curl -sS -o /tmp/release_lookup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          if [ "$http_status" = "200" ]; then
            gh release upload "$RELEASE_TAG" release_assets/* \
              --repo "${{ github.repository }}" \
              --clobber
          elif [ "$http_status" = "404" ]; then
            gh release create "$RELEASE_TAG" release_assets/* \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --generate-notes
          else
            echo "Error: failed to query GitHub release. HTTP status: $http_status"
            cat /tmp/release_lookup.json
            exit 1
          fi

      - name: Publish to NuGet.org
        if: ${{ inputs.publish_nuget }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --timeout 600

      - name: Publish to GitHub Packages
        if: ${{ inputs.publish_github }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text

          dotnet nuget push nupkgs/*.nupkg \
            --source github \
            --api-key "$GITHUB_TOKEN" \
            --skip-duplicate \
            --timeout 600
